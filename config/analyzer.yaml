ruleset:
  - security_plain_text_token
  - security_insecure_logging
  - security_unencrypted_file_storage

llm_integration:
  enabled: true
  # Выбор провайдера: 'ollama' (локально, бесплатно) или 'deepseek' (дешевый API)
  provider: "deepseek" 
  
  # Настройки для Ollama (локальный запуск)
  ollama:
    model_name: "deepseek-coder:6.7b"
    base_url: "http://localhost:11434"
    timeout: 120

  # Настройки для DeepSeek API
  deepseek:
    api_key: "sk-bb0ac39ecd92487bbdf1d89ddb214201" # Замените на ваш реальный ключ DeepSeek
    model_name: "deepseek-chat"
    base_url: "https://api.deepseek.com"
    
  # Порог уверенности (0.0 - 1.0). Если уверенность модели ниже, предупреждение помечается как "Low" или игнорируется.
  confidence_threshold: 0.6

sources_sinks:
  sources: 
    - "UITextField.text"
    - "CLLocationManager.location"
    - "UIImagePickerController"
    - "KeychainWrapper.standard"
  sinks: 
    - "UserDefaults.standard.set"
    - "FileManager.write"
    - "print"
    - "NSLog"
    - "URLSession.shared.dataTask"

ignored_paths:
  - "Pods/"
  - "Carthage/"
  - "build/"
  - ".git/"
  - "Tests/"
  - "DerivedData/"